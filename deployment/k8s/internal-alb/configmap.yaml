apiVersion: v1
kind: ConfigMap
metadata:
  name: internal-alb-nginx-config
  namespace: bookstore-ns
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location = /status {
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location /books {
        proxy_pass http://bookstore-books.bookstore-ns.svc.cluster.local:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /customers {
        proxy_pass http://bookstore-customers.bookstore-ns.svc.cluster.local:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        return 404;
      }
    }
